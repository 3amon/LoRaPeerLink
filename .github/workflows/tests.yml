name: CI Build and Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake g++ catch2 python3 python3-pip
        pip3 install cryptography

    - name: Configure and Build
      run: |
        mkdir build && cd build
        cmake ..
        make

    - name: Run C++ Tests
      run: ./build/tests/test_all

    - name: Run Python-C++ Cross-Validation Tests
      run: python3 validate_encryption.py

    - name: Export PlatformIO Library
      if: success()
      run: ./export_library.sh

    - name: Upload Library Export
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: LoRaPeerLink-PlatformIO-Library
        path: LoRaPeerLink-Export/
        retention-days: 90
